version: '3.8'

services:

  backend:
    build: .
    container_name: biblioteca_backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=biblioteca_db
      - DB_USER=admin
      - DB_PASSWORD=admin123
    depends_on:
      db:
        condition: service_healthy
    networks:
      - biblioteca_network
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: biblioteca_db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=biblioteca_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
    volumes:
      - biblioteca_data:/var/lib/postgresql/data
    networks:
      - biblioteca_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d biblioteca_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  biblioteca_network:
    driver: bridge

volumes:
  biblioteca_data: